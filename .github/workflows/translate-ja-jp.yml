name: Translate ja-JP

on:
  repository_dispatch:
    types:
      - translate-ja-jp-release
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ja-JP
      locale_slug: ja-jp
    secrets: inherit
