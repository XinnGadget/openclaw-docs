name: Translate pt-BR

on:
  repository_dispatch:
    types:
      - translate-pt-br-release
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: pt-BR
      locale_slug: pt-br
    secrets: inherit
