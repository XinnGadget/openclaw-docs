name: Translate ko

on:
  repository_dispatch:
    types:
      - translate-ko-release
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ko
      locale_slug: ko
    secrets: inherit
