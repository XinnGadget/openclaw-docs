name: Translate tr

on:
  repository_dispatch:
    types:
      - translate-tr-release
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: tr
      locale_slug: tr
    secrets: inherit
