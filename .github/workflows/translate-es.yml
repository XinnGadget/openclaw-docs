name: Translate es

on:
  repository_dispatch:
    types:
      - translate-es-release
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: es
      locale_slug: es
    secrets: inherit
