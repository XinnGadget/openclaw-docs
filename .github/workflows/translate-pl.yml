name: Translate pl

on:
  repository_dispatch:
    types:
      - translate-pl-release
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: pl
      locale_slug: pl
    secrets: inherit
