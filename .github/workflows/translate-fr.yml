name: Translate fr

on:
  repository_dispatch:
    types:
      - translate-fr-release
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: fr
      locale_slug: fr
    secrets: inherit
