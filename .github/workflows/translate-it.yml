name: Translate it

on:
  repository_dispatch:
    types:
      - translate-it-release
  schedule:
    - cron: "47 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: it
      locale_slug: it
    secrets: inherit
